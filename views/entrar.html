<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-warning">
        <div class="container">
            <a href="#" class="navbar-brand fw-bold">Loja do Pietro</a>
            <a href="../index.html" class="btn btn-outline-secondary">Voltar</a>
        </div>
    </nav>


    <main class="container d-flex justify-content-center align-items-center" style="height: 80vh;">
        <div class="card p-4 shadow">
            <h3 class="text-center mb-4">Entrar na Conta</h3>

            <form>
                <div class="mb-3">
                    <label class="form-label">Nome de Usuário</label>
                    <input type="text" class="form-control" placeholder="Digite seu usuário">
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" class="form-control" placeholder="Digite sua senha">
                </div>

                <div class="mb-3 form-check">
                    <input class="form-check-input" type="checkbox">
                    <label class="form-check-label">
                        Lembrar de mim
                    </label>
                </div>

                <div class="d-grid">
                    <button class="btn btn-warning fw-bold">Entrar</button>
                </div>

            </form>

            <div class="text-center mt-3">
                <p>
                    Não tem uma conta? 
                    <a href="./cadastro.html">Criar Conta</a>
                </p>
            </div>

        </div>
    </main>
</body>

</html>
